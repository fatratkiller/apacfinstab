name: 定时健康监控

on:
  schedule:
    # 每小时检查一次
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 🏥 网站健康检查
        id: health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://apacfinstab.com" --max-time 15)
          echo "status=$status" >> $GITHUB_OUTPUT
          
          if [ "$status" != "200" ]; then
            echo "❌ 网站返回 $status - 可能宕机！"
            exit 1
          fi
          echo "✅ 网站正常运行"

      - name: 🚨 宕机告警
        if: failure()
        run: |
          echo "::error::网站可能宕机！状态码: ${{ steps.health.outputs.status }}"
          # 可以在这里添加Discord/Slack通知
